services:
  # ── Epever Solar Monitor ────────────────────────────────────────────
  epever-solar:
    build: .
    container_name: epever-solar
    restart: unless-stopped
    privileged: true
    ports:
      - "${MONITOR_PORT:-8080}:8080"
      - "${METRICS_PORT:-9812}:8080"
    volumes:
      - /dev:/dev
      - /var/run/dbus:/var/run/dbus
    environment:
      - SERIAL_PORT=${SERIAL_PORT:-/dev/ttyUSB0}
      - BAUD_RATE=${BAUD_RATE:-115200}
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DALY_BMS_ADDRESS=${DALY_BMS_ADDRESS:-}
      - VICTRON_ADDRESS=${VICTRON_ADDRESS:-}
      - VICTRON_ENCRYPTION_KEY=${VICTRON_ENCRYPTION_KEY:-}
      - BLE_POLL_INTERVAL=${BLE_POLL_INTERVAL:-30}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: epever-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    depends_on:
      epever-solar:
        condition: service_healthy

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: epever-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-solar}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/solar-dashboard.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
